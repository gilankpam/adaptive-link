name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run C tests
        run: make test-c

      - name: Run Python tests
        run: make test-python

  build-release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache musl cross-compiler
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: /opt/armv7l-linux-musleabihf-cross
          key: musl-armv7l-linux-musleabihf-cross

      - name: Download musl cross-compiler
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://musl.cc/armv7l-linux-musleabihf-cross.tgz | tar xz -C /opt

      - name: Cross-compile alink_drone
        run: |
          export PATH="/opt/armv7l-linux-musleabihf-cross/bin:$PATH"
          make -C drone \
            CC=armv7l-linux-musleabihf-gcc \
            OPT="-march=armv7-a -mfpu=neon-vfpv4 -mfloat-abi=hard -Os" \
            LDFLAGS="-lm -lpthread -static"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: Build ${{ github.sha }}
          body: ${{ github.event.head_commit.message }}
          files: |
            drone/alink_drone
            ground-station/alink_gs
