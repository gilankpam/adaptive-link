# adaptive-link VRX settings

[outgoing]
udp_ip = 10.5.0.10
udp_port = 9999

[json]
host = 127.0.0.1
port = 8103

[weights]
snr_weight = 0.5
rssi_weight = 0.5

[ranges]
snr_min = 12
snr_max = 38
rssi_min = -80
rssi_max = -30

[keyframe]
allow_idr = True
idr_max_messages = 20

[dynamic refinement]
allow_penalty = False

[noise]
min_noise = 0.01
max_noise = 0.1
deduction_exponent = 0.5

[error estimation]
kalman_estimate = 0.005
kalman_error_estimate = 0.1
process_variance = 1e-5
measurement_variance = 0.01

[scoring]
rf_weight = 0.5
loss_weight = 0.25
fec_weight = 0.15
diversity_weight = 0.1
max_loss_rate = 0.1
max_rssi_spread = 20

[profile selection]
txprofiles_file = /etc/txprofiles.conf
hold_fallback_mode_ms = 1000
hold_modes_down_ms = 3000
min_between_changes_ms = 200
hysteresis_percent = 5
hysteresis_percent_down = 5
ema_fast_alpha = 0.5
ema_slow_alpha = 0.15
predict_multi = 1.0
fast_downgrade = True
upward_confidence_loops = 3
limit_max_score_to = 2000
dynamic_mode = False

[dynamic]
snr_safety_margin = 3
snr_ema_alpha = 0.3
loss_margin_weight = 20
fec_margin_weight = 5
max_mcs = 5
short_gi_snr_margin = 5
loss_threshold_for_fec_downgrade = 0.10
fec_redundancy_ratio = 0.33
max_fec_redundancy = 0.5
utilization_factor = 0.7
max_bitrate = 30000
min_bitrate = 800
max_power = 2500
min_power = 200
bandwidth = 20
gop = 10
qp_delta = -12
roi_qp = 0,0,0,0
max_mcs_step_up = 1

[telemetry]
log_enabled = True
log_dir = /var/log/alink
log_rotate_mb = 50
outcome_window_ticks = 10
adapter_id = default
