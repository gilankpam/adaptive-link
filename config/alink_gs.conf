# adaptive-link VRX settings

[outgoing]
udp_ip = 10.5.0.10
udp_port = 9999

[wfb-ng]
host = 127.0.0.1
port = 8103

[keyframe]
allow_idr = True
idr_max_messages = 20

[profile selection]
hold_fallback_mode_ms = 1000
hold_modes_down_ms = 3000
min_between_changes_ms = 200
fast_downgrade = True
upward_confidence_loops = 3

[gate]
# Two-channel gate tuning (physical units, dB of SNR margin).
#
# Channel A (SNR margin, slow/symmetric):
#   hysteresis_up_db     — dB of headroom above MCS threshold required to upgrade
#   hysteresis_down_db   — dB below threshold before downgrade fires
#   snr_slope_alpha      — EMA alpha for the per-tick SNR delta (trend)
#   snr_predict_horizon_ticks — ticks to extrapolate when computing upgrade margin
#
# Channel B (emergency, fast/asymmetric):
#   emergency_loss_rate      — loss rate that forces immediate one-step downgrade
#   emergency_fec_pressure   — FEC pressure that forces immediate one-step downgrade
hysteresis_up_db = 2.5
hysteresis_down_db = 1.0
snr_slope_alpha = 0.3
snr_predict_horizon_ticks = 3
emergency_loss_rate = 0.15
emergency_fec_pressure = 0.75

[dynamic]
snr_safety_margin = 3
snr_ema_alpha = 0.3
loss_margin_weight = 20
fec_margin_weight = 5
max_mcs = 5
short_gi_snr_margin = 5
loss_threshold_for_fec_downgrade = 0.10
fec_redundancy_ratio = 0.25
max_fec_redundancy = 0.5
max_fec_n = 30
utilization_factor = 0.8
max_bitrate = 24000
min_bitrate = 1000
max_power = 3000
min_power = 200
bandwidth = 20
gop = 10
max_mcs_step_up = 1

[telemetry]
log_enabled = True
log_dir = /var/log/alink
log_rotate_mb = 50
outcome_window_ticks = 10
adapter_id = default
