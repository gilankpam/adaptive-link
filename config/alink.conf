### alink_drone settings ###

### allow alink to set power
allow_set_power=1

### load ldpc and stbc from wfb.yaml
get_card_info_from_yaml=1

### if gs heartbeat lost for x ms, apply fallback profile
fallback_ms=1000

### Fallback profile – applied when GS heartbeat is lost
fallback_gi=long
fallback_mcs=0
fallback_feck=2
fallback_fecn=3
fallback_bitrate=1024
fallback_gop=1
fallback_power=3000
fallback_bandwidth=20

### ROI QP – computed on drone from bitrate
### roiqp_base=0 disables the feature (default)
### When enabled, roiQp scales linearly between roiqp_lo and roiqp_hi (kbps)
roiqp_hi=8000
roiqp_lo=2000
roiqp_base=-12

### allow lost GS packet to request new keyframe
allow_request_keyframe=1
# allow drone driver-tx_dropped to request new keyframe
allow_rq_kf_by_tx_d=1
# how often to check driver-xtx
check_xtx_period_ms=2250
# minimum ms between HTTP keyframe requests to the camera API; shared
# rate limit across GS-initiated codes and drone tx-drop triggers
request_keyframe_interval_ms=200
# request a keyframe at every link change
idr_every_change=0

# reduce bitrate on driver-tx dropped for 1 second or until xtx stops
allow_xtx_reduce_bitrate=1
# reduce bitrate to
xtx_reduce_bitrate_factor=0.8

### how much info on OSD (0 to 6). 4 = all on one line. 6 = all on multiple lines
osd_level=6
# make custom text smaller/bigger
multiply_font_size_by=1

### wfb_tx control-socket UDP port; FEC/MCS are sent directly, no subprocess
wfbControlPort=8000

### Debug OSD: when enabled, appends an extra line to the OSD with applied
### K/N, computed t_block, profile apply age/count, radio throughput, kernel
### TX-drop rate, wfb_tx fec_timeout/truncated counters, and the
### bitrate-reduced flag. Intended for diagnosing in-flight stutter/latency.
### Set debug_mtu_payload_bytes to the encoder's actual outgoing UDP packet
### size (must match the GS's mtu_payload_bytes) so the t_block estimate is
### accurate. Disabled by default because it queries wfb_tx CMD_GET_STATS
### once per second, which only works against a patched wfb_tx.
debug_osd=1
debug_mtu_payload_bytes=1400

### Command templates – Don't change these unless you know what you are doing
powerCommandTemplate="iw dev wlan0 set txpower fixed {power}"
#powerCommandTemplate="tx_manager.sh set_tx_power {power}"
### HTTP API templates are path-only — the daemon always talks to majestic
### on localhost:80. Legacy full-URL form (http://localhost/...) is still
### accepted for backward compatibility.
idrApiCommandTemplate="/request/idr"

### Batched API command template (uses native HTTP client, no curl)
### Combines bitrate, gop, and drone-computed roiQp into a single HTTP request
### Placeholders: {bitrate}, {gop}, {roiQp}
apiCommandTemplate="/api/v1/set?video0.bitrate={bitrate}&video0.gopSize={gop}&fpv.roiQp={roiQp}"

customOSD=&L%d0&F%d&B CPU:&C,&Tc TX:&Wc&G8
