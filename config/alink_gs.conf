# adaptive-link VRX settings

[outgoing]
udp_ip = 10.5.0.10
udp_port = 9999

[wfb-ng]
host = 127.0.0.1
port = 8103

[keyframe]
allow_idr = True
idr_max_messages = 4
idr_send_interval_ms = 20

[handshake]
resync_interval_s = 30
video_fps_default = 90
fast_retry_ms = 500
max_fast_retries = 3

[hardware]
# Adapter and encoder limits — set per hardware, not per flight.
bandwidth = 20
gop = 1
max_bitrate = 24000
min_bitrate = 1000
max_power = 3000
min_power = 200
max_fec_n = 15
max_fec_redundancy = 0.5

[gate]
# Two-channel gate tuning (physical units, dB of SNR margin).
#
# SNR smoothing:
#   snr_ema_alpha     — EMA alpha for raw SNR → snr_ema
#   snr_slope_alpha   — EMA alpha for the per-tick SNR delta (trend)
#   snr_predict_horizon_ticks — ticks to extrapolate when computing upgrade margin
#
# Margin computation (stress-widened):
#   snr_safety_margin    — base safety margin (dB)
#   loss_margin_weight   — additional margin per unit of loss rate
#   fec_margin_weight    — additional margin per unit of FEC pressure
#
# Channel A (SNR margin, slow/symmetric):
#   hysteresis_up_db     — dB of headroom above MCS threshold required to upgrade
#   hysteresis_down_db   — dB below threshold before downgrade fires
#
# Channel B (emergency, fast/asymmetric):
#   emergency_loss_rate      — loss rate that forces immediate one-step downgrade
#   emergency_fec_pressure   — FEC pressure that forces immediate one-step downgrade
#
# MCS constraints:
#   max_mcs          — upper MCS bound (0-7)
#   max_mcs_step_up  — max MCS steps per single upgrade (0 = unlimited)
snr_ema_alpha = 0.3
snr_slope_alpha = 0.3
snr_predict_horizon_ticks = 3
snr_safety_margin = 3
loss_margin_weight = 20
fec_margin_weight = 5
hysteresis_up_db = 2.5
hysteresis_down_db = 1.0
emergency_loss_rate = 0.05
emergency_fec_pressure = 0.80
max_mcs = 5
max_mcs_step_up = 1

[profile selection]
hold_fallback_mode_ms = 1000
hold_modes_down_ms = 2000
min_between_changes_ms = 200
fast_downgrade = True
upward_confidence_loops = 4

[dynamic]
# Guard interval tuning
# Force long
short_gi_snr_margin = 999
short_gi_max_loss = 0.02
short_gi_max_fec_pressure = 0.3
# FEC computation
fec_redundancy_ratio = 0.2
loss_threshold_for_fec_downgrade = 0.10
# UDP payload size (bytes) that Majestic sends to wfb_tx. The default 1446
# matches a standard 1500-byte Ethernet MTU minus IP/UDP headers. If running
# Majestic with wfb-ng mlink and a larger MTU (e.g. 3893), set this to match —
# otherwise fec_k will be ~2.7x too large and block recovery latency will
# double. wfb-ng's hard ceiling is ~3900; larger values are clamped with a
# warning at startup.
mtu_payload_bytes = 3893
# FEC block-completion latency budget (ms). Sizes K so that
# t_block = K / packets_per_sec ≈ block_latency_budget_ms.
#
# On a clean link, source packets are aired immediately and K has no latency
# cost (see docs/FEC_CALCULATION.md). On packet loss the RX must wait for the
# TX block to complete before FEC decode can run, so this budget is the
# recovery-latency cap.
#
# Smaller budget = faster recovery but less burst tolerance per block
# (fewer parity packets grouped together). 5 ms is a good default for 60 fps
# video on wfb-ng links. Typical range: 3–10 ms.
block_latency_budget_ms = 5
# Bitrate computation
utilization_factor = 0.8

[ml]
# Online adaptive parameters — learn during flight.
# Seed values come from [gate] and [dynamic]. Per-param bounds constrain drift.
outcome_window_ticks = 10
confirm_timeout_ticks = 10
persist_path = /etc/alink_adaptive.json
# snr_safety_margin: increase on bad (wider margin = safer MCS)
snr_safety_margin_lr_up = 0.5
snr_safety_margin_lr_down = 0.05
snr_safety_margin_min = 1.0
snr_safety_margin_max = 10.0
# fec_redundancy_ratio: increase on bad (more FEC = more protection)
fec_redundancy_ratio_lr_up = 0.02
fec_redundancy_ratio_lr_down = 0.005
fec_redundancy_ratio_min = 0.10
fec_redundancy_ratio_max = 0.50
# utilization_factor: decrease on bad (less aggressive = safer)
utilization_factor_lr_up = 0.05
utilization_factor_lr_down = 0.01
utilization_factor_min = 0.2
utilization_factor_max = 0.9
# hysteresis_up_db: increase on bad (harder to upgrade = safer)
hysteresis_up_db_lr_up = 0.3
hysteresis_up_db_lr_down = 0.05
hysteresis_up_db_min = 0.5
hysteresis_up_db_max = 6.0

[telemetry]
log_enabled = True
log_dir = /var/log/alink
log_rotate_mb = 50
outcome_window_ticks = 10
adapter_id = bl-m8812eu2

[optimizer]
# Comma-separated parameter names to freeze when this file is passed as
# --config to ground-station/ml/optimize_params.py. Not read by alink_gs
# or the drone. Example:
#   skip_optimize_params = hysteresis_up_db, max_mcs
skip_optimize_params =
